<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no"
		/>
		<title>FXCommands Settings</title>
		<link rel="stylesheet" href="sdpi.css" />
	</head>
	<body>
		<div class="sdpi-wrapper">
			<details>
				<summary>Advanced Settings</summary>
				<div class="sdpi-item">
					<div class="sdpi-item-label">No. of states (Max 5)</div>
					<input
						class="sdpi-item-value"
						type="number"
						placeholder="1"
						value="1"
						id="desiredStates"
						min="1"
						max="5"
						pattern="[0-9]{1,2}"
						onchange="setDesiredState()"
					/>
				</div>
			</details>
			<div id="State0">
				<div class="sdpi-heading">Command</div>
				<div class="sdpi-item">
					<div class="sdpi-item-label">On Press</div>
					<input
						class="sdpi-item-value"
						placeholder="e.g. e sit"
						value=""
						id="commandPressed0"
						oninput="saveSettings()"
					/>
				</div>
				<div class="sdpi-item">
					<div class="sdpi-item-label">On Release</div>
					<input
						class="sdpi-item-value"
						placeholder="e.g. e c"
						value=""
						id="commandReleased0"
						oninput="saveSettings()"
					/>
				</div>
			</div>
			<div id="State1" style="display: none">
				<div class="sdpi-heading">Command (State 1)</div>
				<div class="sdpi-item">
					<div class="sdpi-item-label">On Press</div>
					<input
						class="sdpi-item-value"
						placeholder="e.g. e sit"
						value=""
						id="commandPressed1"
						oninput="saveSettings()"
					/>
				</div>
				<div class="sdpi-item">
					<div class="sdpi-item-label">On Release</div>
					<input
						class="sdpi-item-value"
						placeholder="e.g. e c"
						value=""
						id="commandReleased1"
						oninput="saveSettings()"
					/>
				</div>
			</div>
			<div id="State2" style="display: none">
				<div class="sdpi-heading">Command (State 2)</div>
				<div class="sdpi-item">
					<div class="sdpi-item-label">On Press</div>
					<input
						class="sdpi-item-value"
						placeholder="e.g. e sit"
						value=""
						id="commandPressed2"
						oninput="saveSettings()"
					/>
				</div>
				<div class="sdpi-item">
					<div class="sdpi-item-label">On Release</div>
					<input
						class="sdpi-item-value"
						placeholder="e.g. e c"
						value=""
						id="commandReleased2"
						oninput="saveSettings()"
					/>
				</div>
			</div>
			<div id="State3" style="display: none">
				<div class="sdpi-heading">Command (State 3)</div>
				<div class="sdpi-item">
					<div class="sdpi-item-label">On Press</div>
					<input
						class="sdpi-item-value"
						placeholder="e.g. e sit"
						value=""
						id="commandPressed3"
						oninput="saveSettings()"
					/>
				</div>
				<div class="sdpi-item">
					<div class="sdpi-item-label">On Release</div>
					<input
						class="sdpi-item-value"
						placeholder="e.g. e c"
						value=""
						id="commandReleased3"
						oninput="saveSettings()"
					/>
				</div>
			</div>
			<div id="State4" style="display: none">
				<div class="sdpi-heading">Command (State 4)</div>
				<div class="sdpi-item">
					<div class="sdpi-item-label">On Press</div>
					<input
						class="sdpi-item-value"
						placeholder="e.g. e sit"
						value=""
						id="commandPressed4"
						oninput="saveSettings()"
					/>
				</div>
				<div class="sdpi-item">
					<div class="sdpi-item-label">On Release</div>
					<input
						class="sdpi-item-value"
						placeholder="e.g. e c"
						value=""
						id="commandReleased4"
						oninput="saveSettings()"
					/>
				</div>
			</div>
		</div>
		<script src="PluginActionPI.js"></script>
	</body>
</html>
